<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Party Queue</title>
        
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <button id="helpBtn">
            ?
        </button>

        <div id="game">

            <div id="scoreboard"></div>

            <div id="scores"></div>
            
            <div id="currentTurn"></div>

            <div id="topPlayers">

                <div id="bot1" class="player"></div>
                <div id="bot2" class="player"></div>
                <div id="bot3" class="player"></div>

            </div>

            <div id="board">

                <div id="partyArea">

                    <h3>🎉 Party</h3>

                    <div id="partyCards"></div>

                </div>

                <div id="queueArea">

                    <div id="queueSlots">

                        <div class="slot"></div>
                        <div class="slot"></div>
                        <div class="slot"></div>
                        <div class="slot"></div>
                        <div class="slot"></div>

                    </div>

                    <div id="queue"></div>

                </div>

                <div id="trashArea">

                    <h3>🗑 Trash</h3>

                    <div id="trashCards"></div>

                </div>

            </div>

            <div id="playerHand"></div>

        </div>

        <div id="helpModal" class="modal hidden">

            <div class="modal-content tutorial-layout">

                <div class="tutorial-header">
                    <h1>Tutorials</h1>

                    <button id="closeHelp" class="icon-btn close">
                        ✕
                    </button>
                </div>

                <div class="tutorial-text">
                    Play animals into the queue.
                    When the queue reaches 5 animals:

                    <ul>
                        <li>First two animals join their owners party.</li>
                        <li>Last animal goes to trash.</li>
                    </ul>
                </div>

                <div id="animalGrid"></div>

            </div>
        </div>

        <div id="cardModal" class="modal hidden">

            <div class="modal-content">

                <div class="modal-header">
                    <button id="cardBackBtn" class="icon-btn">
                        ←
                    </button>
                </div>

                <div id="cardModalContent"></div>

            </div>

        </div>

        <script type="module" src="js/main.js"></script>

    </body>
</html>
